services:
  - type: web
    name: flight-itinerary-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1 --threads 4
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_VISION_MODEL
        value: qwen/qwen3.6-27b
      - key: SECRET_KEY
        generateValue: true
